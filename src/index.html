<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a0a2e" />
  <title>PurTV Donghua</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d0118; }

    #splash-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #0d0118;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash-screen img { width: 180px; height: auto; animation: pulse 1.5s ease-in-out infinite; }
    #splash-screen .title { color: #fff; font-size: 22px; font-weight: bold; margin-top: 16px; letter-spacing: 1px; }
    #splash-screen .subtitle { color: #b39ddb; font-size: 13px; margin-top: 4px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }

    #offline-screen {
      position: fixed; inset: 0; z-index: 9998;
      background: linear-gradient(135deg, #0d0118 0%, #1a0a2e 50%, #0d0118 100%);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px;
    }
    #offline-screen .offline-icon { font-size: 72px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
    #offline-screen h2 { color: #fff; font-size: 24px; font-weight: 700; margin-bottom: 10px; text-align: center; }
    #offline-screen p { color: #b39ddb; font-size: 14px; text-align: center; line-height: 1.6; max-width: 280px; margin-bottom: 28px; }
    #offline-screen .retry-btn {
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: #fff; border: none; padding: 14px 36px;
      border-radius: 50px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(124,58,237,0.5);
    }
    #offline-screen .retry-btn:active { transform: scale(0.96); }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }

    #webview-container {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none; background: #0d0118;
    }
    #webview-container iframe {
      width: 100%; height: 100%;
      border: none;
    }

    /* Status bar safe area */
    body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  </style>
</head>
<body>

<!-- Splash Screen -->
<div id="splash-screen">
  <img src="icon.jpeg" alt="PurTV" />
  <div class="title">PurTV</div>
  <div class="subtitle">✦ Donghua ✦</div>
</div>

<!-- Offline Screen -->
<div id="offline-screen">
  <div class="offline-icon">📡</div>
  <h2>Tidak Ada Koneksi</h2>
  <p>Periksa koneksi internet kamu dan coba lagi untuk menonton Donghua favorit.</p>
  <button class="retry-btn" onclick="retryConnection()">🔄 Coba Lagi</button>
</div>

<!-- Main WebView -->
<div id="webview-container">
  <iframe
    id="main-frame"
    src="https://puruboy-api.vercel.app/page/purtv-donghua"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen
  ></iframe>
</div>

<script>
  const APP_URL = 'https://puruboy-api.vercel.app/page/purtv-donghua';
  const splash = document.getElementById('splash-screen');
  const offlineScreen = document.getElementById('offline-screen');
  const frame = document.getElementById('main-frame');

  function isOnline() {
    return navigator.onLine;
  }

  function showOffline() {
    offlineScreen.style.display = 'flex';
    document.getElementById('webview-container').style.opacity = '0.3';
  }

  function hideOffline() {
    offlineScreen.style.display = 'none';
    document.getElementById('webview-container').style.opacity = '1';
  }

  function retryConnection() {
    if (isOnline()) {
      hideOffline();
      frame.src = APP_URL;
    } else {
      // Shake animation feedback
      const btn = document.querySelector('.retry-btn');
      btn.style.transform = 'translateX(-5px)';
      setTimeout(() => btn.style.transform = 'translateX(5px)', 100);
      setTimeout(() => btn.style.transform = 'translateX(0)', 200);
    }
  }

  // Hide splash after load
  function hideSplash() {
    setTimeout(() => {
      splash.style.opacity = '0';
      setTimeout(() => splash.style.display = 'none', 500);
    }, 1500);
  }

  // Check on startup
  window.addEventListener('load', () => {
    if (!isOnline()) {
      showOffline();
    }
    hideSplash();
  });

  // Listen for online/offline events
  window.addEventListener('online', () => {
    hideOffline();
    frame.src = APP_URL;
  });

  window.addEventListener('offline', () => {
    showOffline();
  });

  // iframe load error fallback
  frame.addEventListener('error', () => {
    if (!isOnline()) showOffline();
  });
</script>
</body>
</html>
