<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PuruTV</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
}

#offline {
  display:none;
  height:100vh;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  text-align:center;
}

.card {
  background:white;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

button {
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  background:#4CAF50;
  color:white;
  font-size:16px;
}

iframe {
  width:100%;
  height:100vh;
  border:none;
}
</style>
</head>

<body>

<div id="offline">
  <div class="card">
    <h2>No Internet</h2>
    <p>Periksa koneksi internet kamu</p>
    <button onclick="retry()">Coba Lagi</button>
  </div>
</div>

<iframe id="app" src=""></iframe>

<script>
const url = "https://puruboy-api.vercel.app/page/purtv-donghua";

function loadApp(){
  if(navigator.onLine){
    document.getElementById('offline').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('app').src = url;
  }else{
    document.getElementById('offline').style.display='flex';
    document.getElementById('app').style.display='none';
  }
}

function retry(){
  loadApp();
}

window.addEventListener('load', loadApp);
window.addEventListener('online', loadApp);
window.addEventListener('offline', loadApp);
</script>

</body>
</html>
