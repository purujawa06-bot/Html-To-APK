<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PurTV Donghua</title>
    <style>
        :root {
            --primary: #ff4757;
            --bg: #0f0f0f;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; 
            overflow: hidden; background-color: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #main-frame {
            width: 100%; height: 100%;
            border: none; display: block;
        }

        #offline-screen {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%);
            display: none; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; color: white; text-align: center;
        }

        .icon-wrapper {
            position: relative; margin-bottom: 30px;
        }
        .icon-circle {
            width: 100px; height: 100px;
            background: rgba(255, 71, 87, 0.2);
            border-radius: 50%; display: flex;
            justify-content: center; align-items: center;
            animation: pulse 2s infinite;
        }
        .icon-circle svg { width: 50px; height: 50px; fill: var(--primary); }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 20px rgba(255, 71, 87, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 71, 87, 0); }
        }

        h2 { font-size: 24px; margin-bottom: 10px; font-weight: 600; }
        p { color: #aaa; margin-bottom: 30px; max-width: 250px; line-height: 1.5; }

        .btn-retry {
            padding: 12px 35px;
            background: var(--primary);
            color: white; border: none;
            border-radius: 50px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
        }
        .btn-retry:active { transform: scale(0.95); }
        .btn-retry:disabled { opacity: 0.6; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="offline-screen">
        <div class="icon-wrapper">
            <div class="icon-circle">
                <svg viewBox="0 0 24 24"><path d="M23.64 7c-.45-.34-4.93-4-11.64-4C5.28 3 .81 6.66.36 7l10.08 12.56c.8 1 2.32 1 3.12 0L23.64 7zm-12.93 9.76c-.41.51-1.17.51-1.58 0L3.61 9.87C5.7 8.35 8.7 7.4 12 7.4s6.3.95 8.39 2.47l-5.52 6.89z"/></svg>
            </div>
        </div>
        <h2>Koneksi Terputus</h2>
        <p>Ups! Sepertinya Anda sedang tidak terhubung ke internet.</p>
        <button class="btn-retry" id="retry-btn" onclick="retryConnection()">Coba Lagi</button>
    </div>

    <iframe 
        id="main-frame" 
        src="https://puruboy-api.vercel.app/page/purtv-donghua" 
        allowfullscreen>
    </iframe>

    <script>
        const frame = document.getElementById('main-frame');
        const offlineScreen = document.getElementById('offline-screen');
        const retryBtn = document.getElementById('retry-btn');

        let isOffline = false;
        let autoRetryTimer = null;

        // Ping URLs untuk cek koneksi nyata (navigator.onLine tidak reliable di Android WebView)
        const PING_URLS = [
            'https://puruboy-api.vercel.app/page/purtv-donghua',
            'https://www.google.com/generate_204',
            'https://connectivitycheck.gstatic.com/generate_204'
        ];

        async function hasRealConnection() {
            for (const url of PING_URLS) {
                try {
                    const controller = new AbortController();
                    const tid = setTimeout(() => controller.abort(), 5000);
                    await fetch(url, {
                        method: 'HEAD',
                        mode: 'no-cors',
                        cache: 'no-store',
                        signal: controller.signal
                    });
                    clearTimeout(tid);
                    return true;
                } catch (e) {
                    // coba URL berikutnya
                }
            }
            return false;
        }

        function showOffline() {
            if (!isOffline) {
                isOffline = true;
                offlineScreen.style.display = 'flex';
                frame.classList.add('hidden');
                // Auto-retry tiap 10 detik
                if (!autoRetryTimer) {
                    autoRetryTimer = setInterval(async () => {
                        if (await hasRealConnection()) showOnline();
                    }, 10000);
                }
            }
        }

        function showOnline() {
            isOffline = false;
            offlineScreen.style.display = 'none';
            frame.classList.remove('hidden');
            // Reload iframe agar konten dimuat ulang
            frame.src = frame.src;
            if (autoRetryTimer) {
                clearInterval(autoRetryTimer);
                autoRetryTimer = null;
            }
        }

        async function checkConnection() {
            if (await hasRealConnection()) {
                showOnline();
            } else {
                showOffline();
            }
        }

        async function retryConnection() {
            retryBtn.innerText = 'Mengecek...';
            retryBtn.disabled = true;
            const ok = await hasRealConnection();
            if (ok) {
                showOnline();
            } else {
                showOffline();
            }
            retryBtn.innerText = 'Coba Lagi';
            retryBtn.disabled = false;
        }

        // Event native (sebagai sinyal awal)
        window.addEventListener('online', checkConnection);
        window.addEventListener('offline', showOffline);

        // Deteksi error iframe (misal koneksi gagal saat load)
        frame.addEventListener('error', checkConnection);

        // Cek saat pertama kali buka
        checkConnection();

        // ─── Fullscreen → Landscape ───────────────────────────────────────
        function lockLandscape() {
            // Web API (didukung Capacitor Android WebView)
            try {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } catch (e) {}
            // Capacitor Screen Orientation plugin (fallback)
            try {
                const SO = window.Capacitor &&
                           window.Capacitor.Plugins &&
                           window.Capacitor.Plugins.ScreenOrientation;
                if (SO) SO.lock({ orientation: 'LANDSCAPE' });
            } catch (e) {}
        }

        function unlockOrientation() {
            try {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            } catch (e) {}
            try {
                const SO = window.Capacitor &&
                           window.Capacitor.Plugins &&
                           window.Capacitor.Plugins.ScreenOrientation;
                if (SO) SO.unlock();
            } catch (e) {}
        }

        // Standard fullscreen event (iframe fullscreen juga trigger ini)
        document.addEventListener('fullscreenchange', () => {
            document.fullscreenElement ? lockLandscape() : unlockOrientation();
        });
        // Webkit prefix (beberapa embedded player pakai ini)
        document.addEventListener('webkitfullscreenchange', () => {
            document.webkitFullscreenElement ? lockLandscape() : unlockOrientation();
        });
        // ──────────────────────────────────────────────────────────────────
    </script>
</body>
</html>
