apply plugin: 'com.android.application'

android {
    namespace "com.purtv.donghua"
    compileSdk 34

    defaultConfig {
        applicationId "com.purtv.donghua"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Include all web assets
        }
    }

    signingConfigs {
        release {
            storeFile file('purtv.keystore')
            storePassword System.getenv('KEYSTORE_PASS') ?: 'purtv123'
            keyAlias System.getenv('KEYSTORE_ALIAS') ?: 'purtv'
            keyPassword System.getenv('KEYSTORE_ALIAS_PASS') ?: 'purtv123'
        }
    }

    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, Google services not enabled")
}
