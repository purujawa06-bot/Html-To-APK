name: Build PurTV-Donghua APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source code ────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Set up JDK 17 ──────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Grant execute permission for gradlew ───────────────────────────
      - name: Grant Execute Permission for gradlew
        run: chmod +x gradlew

      # ── 4. Cache Gradle dependencies ──────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 5. Build Release APK ───────────────────────────────────────────────
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # ── 6. Rename APK to PurTV-Donghua.apk ────────────────────────────────
      - name: Rename APK
        run: |
          find app/build/outputs/apk -name "*.apk" | head -1 | xargs -I{} cp {} app/build/outputs/apk/release/PurTV-Donghua.apk
          echo "APK files found:"
          find app/build/outputs/apk -name "*.apk"

      # ── 7. Upload APK as artifact ──────────────────────────────────────────
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PurTV-Donghua-APK
          path: app/build/outputs/apk/release/PurTV-Donghua.apk
          retention-days: 30

      # ── 8. Create GitHub Release (only on push to main/master) ────────────
      - name: Get current date
        if: github.event_name == 'push'
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ steps.date.outputs.date }}
          name: "PurTV Donghua v1.0 (${{ steps.date.outputs.date }})"
          body: |
            ## 📱 PurTV Donghua APK

            Aplikasi streaming Donghua Sub Indo

            ### ✨ Fitur
            - 🐱 Tampilan PurTV Donghua
            - 📺 Streaming langsung dari puruboy-api.vercel.app
            - 💾 Riwayat nonton tersimpan
            - 🌐 WebView full-screen
            - ⬅️ Tombol back navigasi
            - 🌙 Dark theme

            ### 📥 Cara Install
            1. Download file `PurTV-Donghua.apk`
            2. Aktifkan **"Install dari sumber tidak dikenal"** di pengaturan HP
            3. Buka file APK dan install
            4. Selamat menonton! 🎬

            ---
            Built automatically by GitHub Actions
          files: app/build/outputs/apk/release/PurTV-Donghua.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
