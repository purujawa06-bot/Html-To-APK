name: Build Signed Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Dependencies
        run: npm install

      - name: Add Android Platform
        run: npx cap add android

      - name: Generate App Icons & Splash
        run: |
          if [ -d "assets" ]; then
            npm run generate-assets
          else
            echo "Folder assets tidak ditemukan, menggunakan ikon default."
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Generate Random Keystore
        run: |
          keytool -genkey -v -keystore release.keystore \
          -alias purtv_alias -keyalg RSA -keysize 2048 -validity 10000 \
          -storepass purtv123 -keypass purtv123 \
          -dname "CN=PurTV, OU=App, O=PurTV, L=Jakarta, S=Jakarta, C=ID"

      - name: Build Android Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/release.keystore \
            -Pandroid.injected.signing.store.password=purtv123 \
            -Pandroid.injected.signing.key.alias=purtv_alias \
            -Pandroid.injected.signing.key.password=purtv123

      - name: Upload Signed APK
        uses: actions/upload-artifact@v4
        with:
          name: PurTV-Release-Signed
          path: android/app/build/outputs/apk/release/app-release.apk
