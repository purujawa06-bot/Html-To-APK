name: Build Signed APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Prepare Icons
        run: |
          mkdir -p app/src/main/res/mipmap-xxxhdpi
          curl -L https://files.catbox.moe/e4yj6y.jpg -o icon.jpg
          convert icon.jpg -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert icon.jpg -resize 192x192 app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png

      - name: Create Random Keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias puruboy -keyalg RSA -keysize 2048 -validity 10000           -storepass "password123" -keypass "password123"           -dname "CN=puruboy, OU=Dev, O=Puru, L=ID, S=ID, C=ID"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PASSWORD: password123
          KEY_PASSWORD: password123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PuruTV-Donghua-Signed
          path: app/build/outputs/apk/release/app-release-unsigned.apk
