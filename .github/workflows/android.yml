name: Build AAB Random Sign

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - run: npm install
      - run: npx cap sync android

      - name: Generate Random Keystore
        run: |
          keytool -genkey -v -keystore android/release.keystore -alias key0 -keyalg RSA -keysize 2048 -validity 10000           -storepass password123 -keypass password123           -dname "CN=Random, OU=Dev, O=App, L=ID, S=ID, C=ID"

      - name: Inject Signing
        run: |
          sed -i '/android {/a\
    signingConfigs {\
        release {\
            storeFile file("release.keystore")\
            storePassword "password123"\
            keyAlias "key0"\
            keyPassword "password123"\
        }\
    }\
    buildTypes {\
        release {\
            signingConfig signingConfigs.release\
        }\
    }' android/app/build.gradle

      - name: Build AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/bundle/release/app-release.aab
