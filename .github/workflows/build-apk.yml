name: Build PurTV-Donghua APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ─── Checkout ───────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ─── Java ───────────────────────────────────────────────────
      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # ─── Node.js ────────────────────────────────────────────────
      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ─── Android SDK ────────────────────────────────────────────
      - name: 📱 Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: 🛠️ Install Android Build Tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"

      # ─── Dependencies ───────────────────────────────────────────
      - name: 📦 Install NPM Dependencies
        run: npm install

      # ─── Capacitor Sync ─────────────────────────────────────────
      - name: 🔄 Capacitor Sync
        run: |
          npx cap sync android
          echo "✅ Capacitor sync complete"

      # ─── Copy Icons & Splash ────────────────────────────────────
      - name: 🎨 Copy Icons & Splash Screens
        run: |
          # Copy mipmap icons
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            src="android/app/src/main/res/mipmap-${density}"
            dst="android/app/src/main/res/mipmap-${density}"
            if [ -d "$src" ]; then
              cp -r "$src"/* "$dst"/ 2>/dev/null || true
            fi
          done

          # Copy splash drawables
          for drawable in drawable drawable-land-hdpi drawable-land-mdpi drawable-land-xhdpi drawable-land-xxhdpi drawable-port-hdpi drawable-port-mdpi drawable-port-xhdpi drawable-port-xxhdpi; do
            src="android/app/src/main/res/${drawable}"
            if [ -d "$src" ]; then
              mkdir -p "$src"
            fi
          done
          echo "✅ Icons copied"

      # ─── Keystore ───────────────────────────────────────────────
      - name: 🔑 Setup Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/purtv.keystore
            echo "✅ Keystore decoded from secret"
          else
            echo "⚠️ No keystore secret found, generating debug keystore..."
            keytool -genkeypair \
              -v \
              -keystore android/app/purtv.keystore \
              -alias purtv \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storepass purtv123 \
              -keypass purtv123 \
              -dname "CN=PurTV, OU=Donghua, O=PurTV, L=ID, S=ID, C=ID"
            echo "✅ Debug keystore generated"
          fi

      # ─── Build APK ──────────────────────────────────────────────
      - name: 🏗️ Build Release APK
        working-directory: android
        env:
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS || 'purtv123' }}
          KEYSTORE_ALIAS: ${{ secrets.KEYSTORE_ALIAS || 'purtv' }}
          KEYSTORE_ALIAS_PASS: ${{ secrets.KEYSTORE_ALIAS_PASS || 'purtv123' }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$(pwd)/app/purtv.keystore" \
            -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
            -Pandroid.injected.signing.key.alias="$KEYSTORE_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEYSTORE_ALIAS_PASS" \
            --stacktrace

      # ─── Rename APK ─────────────────────────────────────────────
      - name: 📝 Rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK_PATH" ]; then
            cp "$APK_PATH" "PurTV-Donghua.apk"
            echo "APK_FILE=PurTV-Donghua.apk" >> $GITHUB_ENV
            echo "✅ APK renamed: PurTV-Donghua.apk"
            ls -lh PurTV-Donghua.apk
          else
            echo "❌ APK not found!"
            find android -name "*.apk"
            exit 1
          fi

      # ─── Upload Artifact ────────────────────────────────────────
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PurTV-Donghua-APK
          path: PurTV-Donghua.apk
          retention-days: 30

      # ─── Release (on tag) ───────────────────────────────────────
      - name: 🚀 Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: PurTV-Donghua.apk
          name: PurTV Donghua ${{ github.ref_name }}
          body: |
            ## 🐱 PurTV Donghua ${{ github.ref_name }}

            ### ✨ Fitur
            - 📺 Streaming Donghua langsung dari puruboy-api
            - 📡 Deteksi offline otomatis dengan pesan ramah
            - 🎨 Ikon dan splash screen kustom
            - 🌙 Dark mode native

            ### 📥 Cara Install
            1. Download `PurTV-Donghua.apk`
            2. Aktifkan **Install dari sumber tidak dikenal** di pengaturan
            3. Buka file APK dan install
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ─── Build Summary ──────────────────────────────────────────
      - name: 📊 Build Summary
        if: always()
        run: |
          echo "### 🐱 PurTV Donghua Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "PurTV-Donghua.apk" ]; then
            SIZE=$(du -h PurTV-Donghua.apk | cut -f1)
            echo "✅ **Build Berhasil!**" >> $GITHUB_STEP_SUMMARY
            echo "- 📦 File: \`PurTV-Donghua.apk\`" >> $GITHUB_STEP_SUMMARY
            echo "- 📏 Ukuran: \`${SIZE}\`" >> $GITHUB_STEP_SUMMARY
            echo "- 🌐 URL: \`https://puruboy-api.vercel.app/page/purtv-donghua\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Build Gagal**" >> $GITHUB_STEP_SUMMARY
          fi
